<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Hartă CJUE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 500px; }
</style>
</head>

<body>

<h2>Locația CJUE</h2>
<div id="map"></div>

<script>
var map = L.map('map').setView([49.61, 6.13], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker([49.61, 6.13]).addTo(map)
.bindPopup("CJUE - Luxemburg")
.openPopup();
</script>

</body>
</html>
